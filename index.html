            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Cards */
        .card {

            border-radius: 12px;
            padding: 26px 30px;
            transition: border-color 0.2s, background 0.2s;

            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--accent);

            display: flex;
            align-items: center;
            gap: 12px;

        .tl-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
        .tl-dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .tl-dot.idle   { background: var(--muted); }
        .tl-line { width: 1px; background: var(--border); flex-shrink: 0; margin: 5px 0 5px 4.5px; flex: 1; min-height: 16px; }

        /* Cert cards */
        .cert-card {
            display: flex; align-items: center; gap: 16px;
            padding: 15px 18px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; transition: border-color 0.2s;

        .cert-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.35em; flex-shrink: 0; }

            .hero { padding: 44px 0 38px; }
            .card { padding: 20px 18px; }

</head>
